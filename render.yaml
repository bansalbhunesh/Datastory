services:
  - type: web
    name: datastory
    env: go
    rootDir: backend
    buildCommand: >
      cd ../frontend &&
      npm ci &&
      npm run build &&
      cp -r dist ../backend/dist &&
      cd ../backend &&
      go build -o bin/datastory ./cmd/server
    startCommand: ./bin/datastory
    envVars:
      - key: FRONTEND_DIST
        value: ./dist
      - key: INCIDENT_LOG_PATH
        value: /tmp/incidents.db
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: LOG_LEVEL
        value: info
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-20250514
      # --- Fill these in Render dashboard ---
      - key: OM_BASE_URL
        sync: false
      - key: OM_EMAIL
        sync: false
      - key: OM_PASSWORD
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
