services:
  - type: web
    name: datastory
    env: go
    rootDir: backend
    healthCheckPath: /healthz
    # buildCommand runs from rootDir (backend). We bundle the React build into
    # backend/dist so the Go binary can serve the SPA via FRONTEND_DIST.
    buildCommand: >-
      set -e &&
      (cd ../frontend && npm ci && npm run build) &&
      rm -rf ./dist &&
      cp -r ../frontend/dist ./dist &&
      go build -o bin/datastory ./cmd/server
    startCommand: ./bin/datastory
    envVars:
      - key: FRONTEND_DIST
        value: ./dist
      - key: INCIDENT_LOG_PATH
        value: /tmp/incidents.db
      # If API_KEY is set later, change ALLOWED_ORIGINS to your real frontend
      # origin(s) — the server refuses to start with "*" + API_KEY.
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: LOG_LEVEL
        value: info
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-20250514
      # --- Fill these in Render dashboard ---
      - key: OM_BASE_URL
        sync: false
      - key: OM_EMAIL
        sync: false
      - key: OM_PASSWORD
        sync: false
      - key: OM_TOKEN
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      # Optional shared-secret API gate. When set, ALLOWED_ORIGINS must NOT be "*".
      - key: API_KEY
        sync: false
